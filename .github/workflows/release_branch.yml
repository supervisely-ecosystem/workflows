name: Release App Branch
run-name: Release "${{ github.ref_name }}" branch
on:
  push:
    branches-ignore:
      - main
      - master
  workflow_dispatch:
    inputs:
      RELEASE_SUBAPP_FILTER:
        description: "Release only matching subapp path (for example: train, serve, or __ROOT_APP__)"
        required: false
        type: string
        default: ""
jobs:
  Supervisely-Release-Branch:
    uses: supervisely-ecosystem/workflows/.github/workflows/common.yml@master
    with:
      SLUG: "${{ github.repository }}"
      RELEASE_VERSION: "${{ github.ref_name }}"
      RELEASE_DESCRIPTION: "'${{ github.ref_name }}' branch release"
      RELEASE_TYPE: "release-branch"
      SUBAPP_PATHS: "__ROOT_APP__, subapp"
      RELEASE_SUBAPP_FILTER: "${{ inputs.RELEASE_SUBAPP_FILTER || '' }}"
