name: Build App Image From Template
run-name: Build App Image for ${{ github.repository }}

on:
  workflow_call:
    inputs:
      tag_version:
        description: "Docker Image Tag (without 'v')"
        required: false
        type: string
        default: ""
      dockerfile_template_path:
        description: "Path to Dockerfile template in this repo"
        required: false
        type: string
        default: "docker/hardened/Dockerfile.tmpl"
      image_name:
        description: "Docker Image Name (optional)"
        required: false
        type: string
        default: ""
      latest_tag:
        required: false
        type: boolean
        default: false
    secrets:
      DOCKERHUB_USERNAME:
        required: false
      DOCKERHUB_TOKEN:
        required: false

permissions:
  contents: read

jobs:
  build-and-push:
    runs-on: gha-runner-supervisely-ecosystem
    steps:
      - uses: actions/checkout@v6

      - uses: actions/checkout@v6
        with:
          repository: supervisely-ecosystem/workflows
          ref: per-app-dockerimages
          path: workflow

      - name: Info
        run: |
          IMAGE_NAME=${{ inputs.image_name }}
          if [ -z "$IMAGE_NAME" ]; then
            IMAGE_NAME=${GITHUB_REPOSITORY#*/}
          fi
          if [[ "$IMAGE_NAME" != supervisely/* ]]; then
            IMAGE_NAME="supervisely/$IMAGE_NAME"
          fi
          echo "IMAGE_NAME=$IMAGE_NAME" >> "$GITHUB_ENV"
          echo "Image name: $IMAGE_NAME"
          echo "Tag version: ${{ inputs.tag_version }}"
          echo "Dockerfile template path: ${{ inputs.dockerfile_template_path }}"

      - name: Prepare tag version
        id: prep
        run: |
          TAG_VERSION="${{ inputs.tag_version }}"
          if [ -z "$TAG_VERSION" ]; then
            TAG_VERSION=$(python3 workflow/scripts/resolve_release_tag.py \
              --config config.json \
              --input-release-tag "${{ inputs.tag_version }}")
          fi
          if [ -z "$TAG_VERSION" ]; then
            echo "Tag version is not set. Provide inputs.tag_version or config.json .version." >&2
            exit 1
          fi
          echo "TAG_VERSION=$TAG_VERSION" >> "$GITHUB_ENV"

      - name: Delete .git folder
        run: |
          rm -rf .git

      - name: Render Dockerfile from template
        run: |
          TEMPLATE_PATH="workflow/${{ inputs.dockerfile_template_path }}"
          if [ ! -f "$TEMPLATE_PATH" ]; then
            echo "Dockerfile template not found at $TEMPLATE_PATH" >&2
            exit 1
          fi
          export REQUIREMENTS_FILE="dev_requirements.txt"
          envsubst '${REQUIREMENTS_FILE}' < "$TEMPLATE_PATH" > Dockerfile

      - name: Build Docker Image ${{ env.IMAGE_NAME }}:${{ env.TAG_VERSION }}
        run: |
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=${{ github.workspace }} \
            --local dockerfile=${{ github.workspace }} \
            --opt filename=Dockerfile \
            --output type=image,name=docker.io/${{ env.IMAGE_NAME }}:${{ env.TAG_VERSION }},push=true  \
            --export-cache type=registry,ref=docker.io/${{ env.IMAGE_NAME }}:buildcache,mode=max \
            --import-cache type=registry,ref=docker.io/${{ env.IMAGE_NAME }}:buildcache

      - name: Build Docker Image ${{ env.IMAGE_NAME }}:latest
        if: inputs.latest_tag
        run: |
          buildctl build \
            --frontend dockerfile.v0 \
            --local context=${{ github.workspace }} \
            --local dockerfile=${{ github.workspace }} \
            --opt filename=Dockerfile \
            --output type=image,name=docker.io/${{ env.IMAGE_NAME }}:latest,push=true  \
            --import-cache type=registry,ref=docker.io/${{ env.IMAGE_NAME }}:buildcache
